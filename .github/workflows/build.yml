name: Build and Notarize macOS App

on:
  push:
    # Only tag pushes cut a release. Pre-merge validation comes from the
    # pull_request trigger; workflow_dispatch lets us validate the build manually.
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    env:
      HAS_APPLE_SECRETS: ${{ secrets.MAC_CERTS_P12_BASE64 != '' }}
      HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Build Tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Apple Certificate
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTS_P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build App
        run: |
          xcodebuild -project XTools.xcodeproj \
            -scheme XTools \
            -configuration Release \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            SYMROOT=$(PWD)/build

      - name: Sign App
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        run: |
          APP_PATH="build/Release/XTools.app"
          ENTITLEMENTS="XTools/XTools.entitlements"

          # Sign embedded frameworks inside-out (deepest first)
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type f | while read -r f; do
              if file "$f" | grep -q "Mach-O"; then
                echo "Signing Mach-O: $f"
                codesign --force --options runtime --timestamp \
                  --sign "Developer ID Application" "$f"
              fi
            done

            find "$APP_PATH/Contents/Frameworks" -name "*.xpc" -type d | while read -r b; do
              echo "Signing bundle: $b"
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$b"
            done
            find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d | while read -r b; do
              echo "Signing bundle: $b"
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$b"
            done
            find "$APP_PATH/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) | while read -r b; do
              echo "Signing bundle: $b"
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$b"
            done
          fi

          # Sign the main app bundle with entitlements
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "Developer ID Application" "$APP_PATH"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize App
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            "build/Release/XTools.app" \
            "$RUNNER_TEMP/notarize.zip"

          SUBMISSION_OUT=$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait 2>&1) || true
          echo "$SUBMISSION_OUT"

          SUBMISSION_ID=$(echo "$SUBMISSION_OUT" | grep -m1 "^  id:" | awk '{print $NF}')
          STATUS=$(echo "$SUBMISSION_OUT" | grep "^  status:" | awk '{print $NF}')

          if [[ "$STATUS" != "Accepted" ]]; then
            echo "--- Notarization log ---"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$TEAM_ID" \
              --password "$APP_SPECIFIC_PASSWORD" 2>&1 || true
            echo "error: Notarization failed with status: $STATUS" >&2
            exit 1
          fi

          xcrun stapler staple "build/Release/XTools.app"

      - name: Create DMG
        run: |
          cd build/Release
          create-dmg \
            --volname "XTools" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "XTools.app" 150 190 \
            --hide-extension "XTools.app" \
            --app-drop-link 450 190 \
            "XTools.dmg" \
            "XTools.app"

      - name: Download Sparkle Tools
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_SPARKLE_KEY == 'true' }}
        run: |
          SPARKLE_VERSION="2.9.0"
          curl -sL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

      - name: Generate Release Notes
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_SPARKLE_KEY == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -f RELEASE_NOTES.html ]]; then
            cp RELEASE_NOTES.html "$RUNNER_TEMP/release_notes.html"
            exit 0
          fi
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "${GITHUB_REF_NAME}" | head -1)
          if [[ -n "$PREV_TAG" ]]; then
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${GITHUB_REF_NAME}" \
              -f previous_tag_name="${PREV_TAG}" \
              --jq '.body' 2>/dev/null || echo "")
          fi
          if [[ -z "$NOTES" && -n "$PREV_TAG" ]]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges 2>/dev/null || echo "")
          fi
          if [[ -z "$NOTES" ]]; then
            NOTES="Bug fixes and improvements."
          fi
          NOTES_HTML=$(echo "$NOTES" | sed 's/^## .*$/<h3>\0<\/h3>/; s/^- \(.*\)$/<li>\1<\/li>/' | sed 's/<h3>## /<h3>/g')
          NOTES_HTML="<ul>${NOTES_HTML}</ul>"
          echo "$NOTES_HTML" > "$RUNNER_TEMP/release_notes.html"

      - name: Sign DMG and Generate Appcast
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_SPARKLE_KEY == 'true' }}
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=$(grep -E '^[[:space:]]*MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)"/\1/')
          BUILD=$(grep -E '^[[:space:]]*CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)"/\1/')
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S %z")
          FILE_LENGTH=$(stat -f%z "build/Release/XTools.dmg")
          DOWNLOAD_URL="https://github.com/XueshiQiao/XTools/releases/download/${TAG_NAME}/XTools.dmg"

          # Sign DMG with EdDSA private key (temp file, not process substitution)
          echo -n "$SPARKLE_EDDSA_KEY" > "$RUNNER_TEMP/sparkle_eddsa.key"
          SIGN_OUTPUT=$("$RUNNER_TEMP/sparkle/bin/sign_update" "build/Release/XTools.dmg" -f "$RUNNER_TEMP/sparkle_eddsa.key")
          rm -f "$RUNNER_TEMP/sparkle_eddsa.key"

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [[ -z "$ED_SIGNATURE" ]]; then
            echo "error: Failed to generate EdDSA signature." >&2
            echo "sign_update output: $SIGN_OUTPUT" >&2
            exit 1
          fi

          RELEASE_NOTES=$(cat "$RUNNER_TEMP/release_notes.html")

          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">'
            echo '  <channel>'
            echo '    <title>XTools Updates</title>'
            echo '    <link>https://github.com/XueshiQiao/XTools</link>'
            echo '    <language>en</language>'
            echo '    <item>'
            echo "      <title>Version ${VERSION}</title>"
            echo "      <description><![CDATA[${RELEASE_NOTES}]]></description>"
            echo "      <pubDate>${PUB_DATE}</pubDate>"
            echo "      <sparkle:version>${BUILD}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>"
            echo '      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>'
            echo "      <enclosure url=\"${DOWNLOAD_URL}\" length=\"${FILE_LENGTH}\" type=\"application/octet-stream\" sparkle:edSignature=\"${ED_SIGNATURE}\" />"
            echo '    </item>'
            echo '  </channel>'
            echo '</rss>'
          } > appcast.xml

          echo "--- Appcast ---"
          cat appcast.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for ${TAG_NAME}"
          git push origin HEAD:main

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XTools-macOS
          path: build/Release/XTools.dmg

      - name: Prepare GitHub Release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          BODY_FILE="$RUNNER_TEMP/github_release_body.md"
          : > "$BODY_FILE"
          if [[ -f RELEASE_NOTES.html ]]; then
            VERSION=$(grep -E '^[[:space:]]*MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)"/\1/')
            awk -v ver="$VERSION" '
              /<h3>What.s New in / {
                if (index($0, "New in " ver "</h3>") > 0) { cap = 1 }
                else if (cap == 1) { cap = 0 }
              }
              cap { print }
            ' RELEASE_NOTES.html > "$BODY_FILE"
          fi
          if [[ -s "$BODY_FILE" ]]; then
            echo "RELEASE_BODY_READY=true" >> "$GITHUB_ENV"
            echo "--- GitHub Release body ---"
            cat "$BODY_FILE"
          else
            echo "RELEASE_BODY_READY=false" >> "$GITHUB_ENV"
            echo "No per-version section found in RELEASE_NOTES.html; using auto-generated notes."
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            build/Release/XTools.dmg
            appcast.xml
          body_path: ${{ env.RELEASE_BODY_READY == 'true' && format('{0}/github_release_body.md', runner.temp) || '' }}
          generate_release_notes: ${{ env.RELEASE_BODY_READY != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: XTools
options:
  bundleIdPrefix: me.xueshi
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  Aptabase:
    url: https://github.com/aptabase/aptabase-swift
    from: "0.3.4"

schemes:
  XTools:
    build:
      targets:
        XTools: all

targets:
  XTools:
    type: application
    platform: macOS
    sources:
      - XTools/Sources
      - XTools/Assets.xcassets
      - XTools/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.xueshi.xtools
        INFOPLIST_FILE: XTools/Info.plist
        CODE_SIGN_ENTITLEMENTS: XTools/XTools.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        # CalVer (YY.MM.<build>) to match the sibling apps (AnyDrag, HyperCapslock).
        # Both fields are written by scripts/bump-version.sh at release time — don't hand-edit.
        MARKETING_VERSION: "26.06.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 584KQTRF3B
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: me.xueshi.xtools.debug
          PRODUCT_NAME: XTools-Debug
    dependencies:
      - package: Sparkle
      - package: Aptabase
        product: Aptabase
